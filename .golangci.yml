version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - errcheck
    - exhaustive
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - nilerr
    - revive
    - staticcheck
    - unused
  settings:
    gocyclo:
      min-complexity: 20
    gosec:
      excludes:
        # These rules are intentionally enforced at typed trust boundaries instead:
        # subprocesses and repository paths are core product capabilities. Other
        # false positives stay locally documented so new credential, permission,
        # and cancellation findings remain enabled repository-wide.
        - G204
        - G304
        - G703
    depguard:
      rules:
        project-dependencies:
          files: [$all]
          deny:
            - pkg: github.com/mattn/go-sqlite3
              desc: Switchyard requires a pure-Go SQLite driver for portable builds.
            - pkg: github.com/sirupsen/logrus
              desc: Use the standard library log/slog package.
            - pkg: go.uber.org/zap
              desc: Use the standard library log/slog package in production code.
  exclusions:
    generated: strict
    warn-unused: true
    rules:
      - path: _test\.go
        linters: [gocyclo, gosec]

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
