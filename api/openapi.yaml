openapi: 3.0.3
info:
  title: Switchyard Local API
  version: 1.0.0
  description: Local control-plane contract shared by browser, desktop, and CLI clients.
servers:
  - url: /api/v1
paths:
  /system:
    get:
      operationId: getSystem
      summary: Read daemon and storage status
      responses:
        "200":
          description: Current daemon status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemInfo"
        default:
          $ref: "#/components/responses/Problem"
  /host:
    get:
      operationId: getHost
      summary: Read current host CPU, memory, and aggregate Docker storage
      responses:
        "200":
          description: Current explicitly partial host observation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostObservation"
        default:
          $ref: "#/components/responses/Problem"
  /resources:
    get:
      operationId: getResourceOverview
      summary: Read aggregate current project resources, budgets, storage, and retention
      responses:
        "200":
          description: Aggregate resource intelligence
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResourceOverview" }
        default:
          $ref: "#/components/responses/Problem"
  /resources/storage:
    get:
      operationId: getStorageInventory
      summary: Inspect Docker storage with explicit attribution confidence
      responses:
        "200":
          description: Read-only storage inventory
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StorageInventory" }
        default:
          $ref: "#/components/responses/Problem"
  /resources/cleanup-preview:
    get:
      operationId: getCleanupPreview
      summary: Preview exact reclaimable resources without deleting anything
      parameters:
        - name: projectId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Non-executable cleanup preview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CleanupPreview" }
        default:
          $ref: "#/components/responses/Problem"
  /auth/bootstrap-tokens:
    post:
      operationId: createBrowserBootstrapToken
      summary: Create a one-time browser bootstrap token over privileged local IPC
      responses:
        "201":
          description: One-time bootstrap token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserBootstrap"
        default:
          $ref: "#/components/responses/Problem"
  /auth/sessions:
    post:
      operationId: createBrowserSession
      summary: Exchange a one-time bootstrap token for a same-origin session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrowserSessionRequest"
      responses:
        "201":
          description: Browser session created
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserSession"
        default:
          $ref: "#/components/responses/Problem"
  /operations/{operationId}:
    parameters:
      - $ref: "#/components/parameters/OperationId"
    get:
      operationId: getOperation
      summary: Read a durable operation
      responses:
        "200":
          description: Durable operation state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        default:
          $ref: "#/components/responses/Problem"
  /operations:
    get:
      operationId: listOperations
      summary: List recent durable operations
      parameters:
        - name: projectId
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, format: int64, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Recent durable operations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Operation" }
        default:
          $ref: "#/components/responses/Problem"
  /operations/{operationId}/cancel:
    parameters:
      - $ref: "#/components/parameters/OperationId"
    post:
      operationId: cancelOperation
      summary: Request idempotent operation cancellation
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Current operation after the cancellation request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        default:
          $ref: "#/components/responses/Problem"
  /manifest-proposals:
    post:
      operationId: createManifestProposal
      summary: Scan a selected repository into an untrusted manifest proposal
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateManifestProposalRequest"
      responses:
        "201":
          description: Reviewable deterministic proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestProposal"
        default:
          $ref: "#/components/responses/Problem"
  /manifest-proposals/{proposalId}:
    parameters:
      - $ref: "#/components/parameters/ProposalId"
    get:
      operationId: getManifestProposal
      summary: Read candidate manifest and source evidence
      responses:
        "200":
          description: Reviewable proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestProposal"
        default:
          $ref: "#/components/responses/Problem"
  /manifest-proposals/{proposalId}/validate:
    parameters:
      - $ref: "#/components/parameters/ProposalId"
    post:
      operationId: validateManifestProposal
      summary: Revalidate an untrusted proposal against the selected root
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Proposal with current validation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestProposal"
        default:
          $ref: "#/components/responses/Problem"
  /manifest-proposals/{proposalId}/accept:
    parameters:
      - $ref: "#/components/parameters/ProposalId"
    post:
      operationId: acceptManifestProposal
      summary: Approve the proposal and trust its project
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Trusted project and accepted proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedManifestProposal"
        default:
          $ref: "#/components/responses/Problem"
  /ai-providers:
    get:
      operationId: listAIProposalProviders
      summary: List configured assisted-onboarding providers and current availability
      responses:
        "200":
          description: Provider capabilities
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AIProviderDescriptor" }
        default:
          $ref: "#/components/responses/Problem"
  /manifest-proposals/{proposalId}/ai-preview:
    parameters:
      - $ref: "#/components/parameters/ProposalId"
    post:
      operationId: previewAIManifestEvidence
      summary: Preview the exact redacted evidence payload for provider consent
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AIGenerationLimits" }
      responses:
        "200":
          description: Exact provider evidence receipt
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIEvidencePreview" }
        default:
          $ref: "#/components/responses/Problem"
  /manifest-proposals/{proposalId}/ai-enhancements:
    parameters:
      - $ref: "#/components/parameters/ProposalId"
    post:
      operationId: createAIManifestEnhancement
      summary: Queue a cancellable assisted-onboarding operation
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAIManifestEnhancementRequest" }
      responses:
        "202":
          description: Durable provider operation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        default:
          $ref: "#/components/responses/Problem"
  /manifest-proposals/{proposalId}/ai-enhancements/{operationId}:
    parameters:
      - $ref: "#/components/parameters/ProposalId"
      - $ref: "#/components/parameters/OperationId"
    get:
      operationId: getAIManifestEnhancement
      summary: Read an assisted-onboarding evidence and review receipt
      responses:
        "200":
          description: Assisted proposal run
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIManifestEnhancement" }
        default:
          $ref: "#/components/responses/Problem"
  /projects:
    get:
      operationId: listProjects
      summary: List registered projects
      responses:
        "200":
          description: Registered project catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProject
      summary: Read one registered project
      responses:
        "200":
          description: Registered project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        default:
          $ref: "#/components/responses/Problem"
    delete:
      operationId: removeProject
      summary: Remove catalog state without changing repository files
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204": { description: Project removed }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/trust:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: trustProject
      summary: Validate and accept the latest project proposal
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Trusted project and accepted proposal
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AcceptedManifestProposal" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/manifest/explain:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: explainProjectManifest
      summary: Resolve the effective manifest with field provenance
      responses:
        "200":
          description: Effective manifest and provenance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EffectiveManifest"
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/manifest/diff:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: diffProjectManifest
      summary: Compare the accepted and effective manifests
      responses:
        "200":
          description: Canonical manifest comparison
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestDiff"
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/manifest/validate:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: validateProjectManifest
      summary: Validate the fully resolved manifest
      responses:
        "200":
          description: Effective manifest validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestValidation"
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/runtime:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProjectRuntime
      summary: Observe current project runtime state
      responses:
        "200":
          description: Current driver observation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeObservation" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/health:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProjectHealth
      summary: Read current persisted health diagnostics
      responses:
        "200":
          description: Current aggregate health with observer freshness
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectHealth" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/runtime/plan:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: planProjectRuntime
      summary: Preview a project lifecycle action without executing it
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RuntimeActionRequest" }
      responses:
        "200":
          description: Side-effect-free lifecycle preview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimePlan" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/operations:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: createProjectOperation
      summary: Queue a durable project lifecycle operation
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RuntimeActionRequest" }
      responses:
        "202":
          description: Durable operation accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/logs:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProjectLogs
      summary: Read a bounded snapshot of runtime logs
      parameters:
        - name: service
          in: query
          schema: { type: string }
        - name: since
          in: query
          schema: { type: string }
        - name: runId
          in: query
          schema: { type: string }
        - name: operationId
          in: query
          schema: { type: string }
        - name: tail
          in: query
          schema: { type: integer, minimum: 1, maximum: 10000, default: 200 }
      responses:
        "200":
          description: Bounded runtime log lines
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RuntimeLogEntry" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/logs/export:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: exportProjectLogs
      summary: Export a bounded redacted project log stream
      parameters:
        - name: service
          in: query
          schema: { type: string }
        - name: runId
          in: query
          schema: { type: string }
        - name: operationId
          in: query
          schema: { type: string }
        - name: format
          in: query
          required: true
          schema: { type: string, enum: [plain, ndjson] }
      responses:
        "200":
          description: Redacted log export
          content:
            text/plain:
              schema: { type: string }
            application/x-ndjson:
              schema: { type: string }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/metrics:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProjectMetrics
      summary: Read one current resource sample per runtime service
      parameters:
        - name: service
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Current runtime resource samples
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RuntimeMetricSample" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/metrics/history:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getMetricHistory
      summary: Read bounded persisted project or service metric history
      parameters:
        - name: service
          in: query
          schema: { type: string }
        - name: from
          in: query
          required: true
          schema: { type: string, format: date-time }
        - name: to
          in: query
          required: true
          schema: { type: string, format: date-time }
        - name: resolution
          in: query
          schema: { type: string, enum: [auto, raw, 1m, 15m], default: auto }
        - name: maxPoints
          in: query
          schema: { type: integer, minimum: 1, maximum: 1000, default: 1000 }
      responses:
        "200":
          description: Chronological retained metric history
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MetricHistory" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/git:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProjectGit
      summary: Read a fresh Git porcelain snapshot for a trusted project
      responses:
        "200":
          description: Current repository state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GitState" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/environments:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listProjectEnvironments
      summary: List registered Git worktree environments for a trusted project
      responses:
        "200":
          description: Stable worktree environment registrations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ProjectEnvironment" }
        default:
          $ref: "#/components/responses/Problem"
    post:
      operationId: registerProjectEnvironments
      summary: Reconcile trusted Git worktrees and allocate exact runtime ports
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Complete worktree registration result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnvironmentRegistration" }
        default:
          $ref: "#/components/responses/Problem"
  /environments/{environmentId}:
    parameters:
      - name: environmentId
        in: path
        required: true
        schema: { type: string, minLength: 1, maxLength: 128 }
    get:
      operationId: getEnvironment
      summary: Read one registered project environment
      responses:
        "200":
          description: Registered environment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectEnvironment" }
        default:
          $ref: "#/components/responses/Problem"
    patch:
      operationId: updateEnvironment
      summary: Update the friendly localhost hostname without changing runtime state
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EnvironmentUpdate" }
      responses:
        "200":
          description: Updated environment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectEnvironment" }
        default:
          $ref: "#/components/responses/Problem"
  /routes:
    get:
      operationId: listLocalRoutes
      summary: List optional localhost routes and explicit availability states
      responses:
        "200":
          description: Current local route registry
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LocalRoute" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/actions:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listProjectActions
      summary: List trusted declarative and built-in quick actions
      responses:
        "200":
          description: Available project actions
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectActions" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/actions/{actionId}/operations:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ActionId"
    post:
      operationId: createActionOperation
      summary: Queue a durable audited project action
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ActionExecutionRequest" }
      responses:
        "202":
          description: Durable action operation accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        default:
          $ref: "#/components/responses/Problem"
  /ports:
    get:
      operationId: getPortRegistry
      summary: Reconcile declared, reserved, and bound local ports
      responses:
        "200":
          description: Current provenance-bearing port registry
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PortRegistry" }
        default:
          $ref: "#/components/responses/Problem"
  /ports/suggestions:
    post:
      operationId: createPortSuggestion
      summary: Suggest the first free port in an explicit preferred range
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PortSuggestionRequest" }
      responses:
        "200":
          description: Free port suggestion based on current evidence
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PortSuggestion" }
        default:
          $ref: "#/components/responses/Problem"
  /workspaces:
    get:
      operationId: listWorkspaces
      summary: List durable multi-project workspaces
      responses:
        "200":
          description: Workspaces in stable display order
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Workspace" }
        default:
          $ref: "#/components/responses/Problem"
    post:
      operationId: createWorkspace
      summary: Create a validated workspace dependency graph
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkspaceDefinition" }
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        default:
          $ref: "#/components/responses/Problem"
  /workspaces/{workspaceId}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      operationId: getWorkspace
      summary: Read one workspace graph and its latest execution
      responses:
        "200":
          description: Workspace graph and execution state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        default:
          $ref: "#/components/responses/Problem"
    put:
      operationId: updateWorkspace
      summary: Replace a workspace graph after revision validation
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkspaceUpdate" }
      responses:
        "200":
          description: Updated workspace
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        default:
          $ref: "#/components/responses/Problem"
    delete:
      operationId: deleteWorkspace
      summary: Remove workspace metadata without touching projects or runtime data
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204": { description: Workspace metadata removed }
        default:
          $ref: "#/components/responses/Problem"
  /workspaces/{workspaceId}/operations:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    post:
      operationId: createWorkspaceOperation
      summary: Queue an ordered workspace start or dependency-safe bulk stop
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkspaceOperationRequest" }
      responses:
        "202":
          description: Durable workspace operation accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        default:
          $ref: "#/components/responses/Problem"
  /terminal-sessions:
    get:
      operationId: listTerminalSessions
      summary: List terminal sessions owned by the current local principal
      parameters:
        - name: projectId
          in: query
          schema: { type: string, maxLength: 128 }
      responses:
        "200":
          description: Owner-scoped terminal session metadata
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TerminalSession" }
        default:
          $ref: "#/components/responses/Problem"
    post:
      operationId: createTerminalSession
      summary: Explicitly create a typed interactive PTY session
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TerminalSessionCreate" }
      responses:
        "201":
          description: Terminal session created and ready for authenticated attachment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TerminalSession" }
        default:
          $ref: "#/components/responses/Problem"
  /terminal-sessions/{terminalSessionId}:
    parameters:
      - $ref: "#/components/parameters/TerminalSessionId"
    get:
      operationId: getTerminalSession
      summary: Read owner-authorized terminal session metadata
      responses:
        "200":
          description: Terminal session metadata
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TerminalSession" }
        default:
          $ref: "#/components/responses/Problem"
  /terminal-sessions/{terminalSessionId}/terminate:
    parameters:
      - $ref: "#/components/parameters/TerminalSessionId"
    post:
      operationId: terminateTerminalSession
      summary: Explicitly terminate an owned PTY process group
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Termination requested
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TerminalSession" }
        default:
          $ref: "#/components/responses/Problem"
  /agents/sessions:
    get:
      operationId: listAgentSessions
      summary: List coding-agent PTY sessions and public output metadata
      parameters:
        - name: projectId
          in: query
          schema: { type: string, maxLength: 128 }
      responses:
        "200":
          description: Owner-scoped agent session metadata
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TerminalSession" }
        default:
          $ref: "#/components/responses/Problem"
    post:
      operationId: createAgentSession
      summary: Start Codex or Claude Code as an interactive PTY process
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentSessionCreate" }
      responses:
        "201":
          description: Agent PTY session created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TerminalSession" }
        default:
          $ref: "#/components/responses/Problem"
components:
  parameters:
    OperationId:
      name: operationId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    TerminalSessionId:
      name: terminalSessionId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    ProposalId:
      name: proposalId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    ActionId:
      name: actionId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
  responses:
    Problem:
      description: RFC 9457-style problem details
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
  schemas:
    PortFact:
      type: object
      additionalProperties: false
      required: [id, kind, host, port, protocol, source, evidence, observedAt]
      properties:
        id: { type: string }
        kind: { type: string, enum: [declaration, reservation, binding] }
        projectId: { type: string }
        projectName: { type: string }
        serviceId: { type: string }
        portId: { type: string }
        host: { type: string }
        port: { type: integer, minimum: 1, maximum: 65535 }
        target: { type: integer, minimum: 0, maximum: 65535 }
        protocol: { type: string, enum: [tcp, udp] }
        source: { type: string, enum: [manifest, compose, switchyard, docker, process, os, manual, worktree] }
        evidence: { type: string }
        processId: { type: integer, minimum: 1 }
        observedAt: { type: string, format: date-time }
    PortConflict:
      type: object
      additionalProperties: false
      required: [id, type, port, summary, facts]
      properties:
        id: { type: string }
        type:
          type: string
          enum: [DECLARED_VS_DECLARED, DECLARED_VS_RESERVED, DECLARED_VS_BOUND, RESERVED_VS_RESERVED, BOUND_BY_UNKNOWN_PROCESS, PROTOCOL_MISMATCH, HOST_ADDRESS_OVERLAP]
        port: { type: integer, minimum: 1, maximum: 65535 }
        summary: { type: string }
        facts:
          type: array
          minItems: 2
          items: { $ref: "#/components/schemas/PortFact" }
    PortRegistry:
      type: object
      additionalProperties: false
      required: [facts, conflicts, observedAt, warnings]
      properties:
        facts:
          type: array
          items: { $ref: "#/components/schemas/PortFact" }
        conflicts:
          type: array
          items: { $ref: "#/components/schemas/PortConflict" }
        observedAt: { type: string, format: date-time }
        warnings:
          type: array
          items: { type: string }
    PortSuggestionRequest:
      type: object
      additionalProperties: false
      required: [rangeStart, rangeEnd, protocol]
      properties:
        rangeStart: { type: integer, minimum: 1, maximum: 65535 }
        rangeEnd: { type: integer, minimum: 1, maximum: 65535 }
        protocol: { type: string, enum: [tcp, udp] }
        projectId: { type: string }
        excluded:
          type: array
          items: { type: integer, minimum: 1, maximum: 65535 }
    PortSuggestion:
      type: object
      additionalProperties: false
      required: [port, rangeStart, rangeEnd, protocol, observedAt]
      properties:
        port: { type: integer, minimum: 1, maximum: 65535 }
        rangeStart: { type: integer, minimum: 1, maximum: 65535 }
        rangeEnd: { type: integer, minimum: 1, maximum: 65535 }
        protocol: { type: string, enum: [tcp, udp] }
        observedAt: { type: string, format: date-time }
    GitChangeCounts:
      type: object
      additionalProperties: false
      required: [staged, modified, untracked, conflicted]
      properties:
        staged: { type: integer, minimum: 0 }
        modified: { type: integer, minimum: 0 }
        untracked: { type: integer, minimum: 0 }
        conflicted: { type: integer, minimum: 0 }
    GitRemote:
      type: object
      additionalProperties: false
      required: [name, url, kind]
      properties:
        name: { type: string }
        url: { type: string }
        kind: { type: string, enum: [fetch, push] }
    GitCommit:
      type: object
      additionalProperties: false
      required: [hash, shortHash, author, subject, committedAt]
      properties:
        hash: { type: string }
        shortHash: { type: string }
        author: { type: string }
        subject: { type: string }
        committedAt: { type: string, format: date-time }
    GitWorktree:
      type: object
      additionalProperties: false
      required: [path, head, detached, bare, locked]
      properties:
        path: { type: string }
        head: { type: string }
        branch: { type: string }
        detached: { type: boolean }
        bare: { type: boolean }
        locked: { type: boolean }
    GitState:
      type: object
      additionalProperties: false
      required: [projectId, repository, detached, ahead, behind, changes, stashes, remotes, worktrees, observedAt]
      properties:
        projectId: { type: string }
        repository: { type: boolean }
        branch: { type: string }
        detached: { type: boolean }
        head: { type: string }
        upstream: { type: string }
        ahead: { type: integer, minimum: 0 }
        behind: { type: integer, minimum: 0 }
        changes: { $ref: "#/components/schemas/GitChangeCounts" }
        stashes: { type: integer, minimum: 0 }
        operationState: { type: string, enum: [merge, rebase, unknown] }
        lastCommit: { $ref: "#/components/schemas/GitCommit" }
        remotes:
          type: array
          items: { $ref: "#/components/schemas/GitRemote" }
        worktrees:
          type: array
          items: { $ref: "#/components/schemas/GitWorktree" }
        observedAt: { type: string, format: date-time }
    ActionDefinition:
      type: object
      additionalProperties: false
      required: [id, name, type, command, workingDirectory, shell, captureOutput, risk, timeoutSeconds]
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        command:
          type: array
          items: { type: string }
        workingDirectory: { type: string }
        shell: { type: boolean }
        captureOutput: { type: boolean }
        provider: { type: string }
        target: { type: string }
        risk: { type: string, enum: [read_only, mutating, networked, destructive, interactive] }
        timeoutSeconds: { type: integer, minimum: 0, maximum: 86400 }
    ProjectActions:
      type: object
      additionalProperties: false
      required: [projectId, projectName, actions]
      properties:
        projectId: { type: string }
        projectName: { type: string }
        actions:
          type: array
          items: { $ref: "#/components/schemas/ActionDefinition" }
    ActionExecutionRequest:
      type: object
      additionalProperties: false
      properties:
        confirmRisk: { type: boolean, default: false }
        allowOutsideRoot: { type: boolean, default: false }
    CreateManifestProposalRequest:
      type: object
      additionalProperties: false
      required: [path]
      properties:
        path:
          type: string
          minLength: 1
          maxLength: 4096
    Project:
      type: object
      additionalProperties: false
      required: [id, slug, displayName, trustState, primaryLocation, tags, manifestRevision, createdAt, updatedAt]
      properties:
        id: { type: string }
        slug: { type: string }
        displayName: { type: string }
        description: { type: string }
        trustState:
          type: string
          enum: [pending, trusted, rejected]
        primaryLocation: { type: string }
        tags:
          type: array
          items: { type: string }
        manifestRevision: { type: integer, format: int64, minimum: 0 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    SourceRange:
      type: object
      additionalProperties: false
      required: [startLine, endLine]
      properties:
        startLine: { type: integer, minimum: 1 }
        endLine: { type: integer, minimum: 1 }
    DiscoveryEvidence:
      type: object
      additionalProperties: false
      required: [id, scanner, kind, sourcePath, location, confidence, data, warnings]
      properties:
        id: { type: string }
        scanner: { type: string }
        kind: { type: string }
        sourcePath: { type: string }
        location: { $ref: "#/components/schemas/SourceRange" }
        confidence: { type: number, format: double, minimum: 0, maximum: 1 }
        data:
          type: object
          additionalProperties: true
        warnings:
          type: array
          items: { type: string }
    ManifestValidation:
      type: object
      additionalProperties: false
      required: [valid, errors, warnings]
      properties:
        valid: { type: boolean }
        errors:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }
    ManifestProposal:
      type: object
      additionalProperties: false
      required: [id, projectId, scannerVersion, schemaVersion, candidate, evidence, confidenceByField, unresolved, validation, status, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        scannerVersion: { type: string }
        schemaVersion: { type: string }
        candidate:
          type: object
          description: Canonical document governed by internal/manifest/schema/project.schema.json.
          additionalProperties: true
        evidence:
          type: array
          items: { $ref: "#/components/schemas/DiscoveryEvidence" }
        confidenceByField:
          type: object
          additionalProperties: { type: number, format: double }
        unresolved:
          type: array
          items: { type: string }
        validation: { $ref: "#/components/schemas/ManifestValidation" }
        status:
          type: string
          enum: [proposed, accepted, rejected, superseded]
        createdAt: { type: string, format: date-time }
    AcceptedManifestProposal:
      type: object
      additionalProperties: false
      required: [project, proposal]
      properties:
        project: { $ref: "#/components/schemas/Project" }
        proposal: { $ref: "#/components/schemas/ManifestProposal" }
    AIGenerationLimits:
      type: object
      additionalProperties: false
      properties:
        evidenceBytes: { type: integer, format: int64, minimum: 4096, maximum: 262144, default: 65536 }
        outputBytes: { type: integer, format: int64, minimum: 4096, maximum: 1048576, default: 262144 }
        timeoutSeconds: { type: integer, minimum: 5, maximum: 600, default: 90 }
        maxTurns: { type: integer, minimum: 1, maximum: 8, default: 1 }
        maxOutputTokens: { type: integer, minimum: 256, maximum: 32768, default: 4096 }
        maxBudgetUsd: { type: number, format: double, minimum: 0, maximum: 25, default: 0 }
    AIProviderDescriptor:
      type: object
      additionalProperties: false
      required: [id, name, kind, available, supportedBudgetKinds]
      properties:
        id: { type: string }
        name: { type: string }
        kind: { type: string, enum: [cli, http] }
        model: { type: string }
        available: { type: boolean }
        reason: { type: string }
        supportedBudgetKinds:
          type: array
          items: { type: string }
    AIEvidenceItem:
      type: object
      additionalProperties: false
      required: [id, kind, sourcePath, location, confidence, data, warnings, truncated]
      properties:
        id: { type: string }
        kind: { type: string }
        sourcePath: { type: string }
        location: { $ref: "#/components/schemas/SourceRange" }
        confidence: { type: number, format: double, minimum: 0, maximum: 1 }
        data: { type: object, additionalProperties: true }
        warnings: { type: array, items: { type: string } }
        excerpt: { type: string }
        truncated: { type: boolean }
    AIEvidenceBundle:
      type: object
      additionalProperties: false
      required: [version, projectId, proposalId, deterministicCandidate, confidenceByField, unresolved, evidence, redactionCount, truncated, encodedBytes]
      properties:
        version: { type: string }
        projectId: { type: string }
        proposalId: { type: string }
        deterministicCandidate: { type: object, additionalProperties: true }
        confidenceByField: { type: object, additionalProperties: { type: number, format: double } }
        unresolved: { type: array, items: { type: string } }
        evidence: { type: array, items: { $ref: "#/components/schemas/AIEvidenceItem" } }
        redactionCount: { type: integer, minimum: 0 }
        truncated: { type: boolean }
        encodedBytes: { type: integer, minimum: 0 }
    AIEvidencePreview:
      type: object
      additionalProperties: false
      required: [bundle, encoded, sha256, limits]
      properties:
        bundle: { $ref: "#/components/schemas/AIEvidenceBundle" }
        encoded: { type: object, additionalProperties: true }
        sha256: { type: string, minLength: 64, maxLength: 64 }
        limits: { $ref: "#/components/schemas/AIGenerationLimits" }
    CreateAIManifestEnhancementRequest:
      type: object
      additionalProperties: false
      required: [provider, limits]
      properties:
        provider: { type: string, minLength: 1, maxLength: 64 }
        limits: { $ref: "#/components/schemas/AIGenerationLimits" }
    AIFieldReview:
      type: object
      additionalProperties: false
      required: [path, source, confidence, evidenceIds, rationale, warnings]
      properties:
        path: { type: string }
        source: { type: string, enum: [deterministic, ai, rejected] }
        confidence: { type: number, format: double, minimum: 0, maximum: 1 }
        evidenceIds: { type: array, items: { type: string } }
        rationale: { type: string }
        warnings: { type: array, items: { type: string } }
    AIConflict:
      type: object
      additionalProperties: false
      required: [path, deterministicValue, proposedValue, resolution]
      properties:
        path: { type: string }
        deterministicValue: {}
        proposedValue: {}
        resolution: { type: string, enum: [kept_deterministic] }
    AIDryRun:
      type: object
      additionalProperties: false
      required: [valid, schemaValid, evidenceBacked, repositorySafe, errors, warnings]
      properties:
        valid: { type: boolean }
        schemaValid: { type: boolean }
        evidenceBacked: { type: boolean }
        repositorySafe: { type: boolean }
        errors: { type: array, items: { type: string } }
        warnings: { type: array, items: { type: string } }
    AIUsage:
      type: object
      additionalProperties: false
      properties:
        inputTokens: { type: integer, minimum: 0 }
        outputTokens: { type: integer, minimum: 0 }
        costUsd: { type: number, format: double, minimum: 0 }
    AIManifestEnhancement:
      type: object
      additionalProperties: false
      required: [operationId, projectId, sourceProposalId, provider, state, bundle, bundleSha256, limits, fields, conflicts, warnings, dryRun, usage, startedAt]
      properties:
        operationId: { type: string }
        projectId: { type: string }
        sourceProposalId: { type: string }
        resultProposalId: { type: string }
        provider: { type: string }
        model: { type: string }
        state: { type: string, enum: [running, succeeded, failed, cancelled] }
        bundle: { type: object, additionalProperties: true }
        bundleSha256: { type: string }
        limits: { $ref: "#/components/schemas/AIGenerationLimits" }
        fields: { type: array, items: { $ref: "#/components/schemas/AIFieldReview" } }
        conflicts: { type: array, items: { $ref: "#/components/schemas/AIConflict" } }
        warnings: { type: array, items: { type: string } }
        dryRun: { $ref: "#/components/schemas/AIDryRun" }
        usage: { $ref: "#/components/schemas/AIUsage" }
        errorCode: { type: string }
        errorMessage: { type: string }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
    ManifestSource:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: { type: string }
        path: { type: string }
    EffectiveManifest:
      type: object
      additionalProperties: false
      required: [manifest, provenance, sources]
      properties:
        manifest: { type: object, additionalProperties: true }
        provenance:
          type: object
          additionalProperties: { type: string }
        sources:
          type: array
          items: { $ref: "#/components/schemas/ManifestSource" }
    ManifestDiff:
      type: object
      additionalProperties: false
      required: [accepted, effective]
      properties:
        accepted: { type: object, additionalProperties: true }
        effective: { type: object, additionalProperties: true }
    BrowserBootstrap:
      type: object
      additionalProperties: false
      required: [token, expiresAt]
      properties:
        token:
          type: string
        expiresAt:
          type: string
          format: date-time
    CreateBrowserSessionRequest:
      type: object
      additionalProperties: false
      required: [bootstrapToken]
      properties:
        bootstrapToken:
          type: string
          minLength: 1
    BrowserSession:
      type: object
      additionalProperties: false
      required: [csrfToken, expiresAt]
      properties:
        csrfToken:
          type: string
        expiresAt:
          type: string
          format: date-time
    RuntimeAction:
      type: string
      enum: [start, stop, restart, pause, unpause, rebuild, teardown]
      x-enum-varnames: [Start, Stop, Restart, Pause, Unpause, Rebuild, Teardown]
    RuntimeActionRequest:
      type: object
      additionalProperties: false
      required: [action]
      properties:
        action: { $ref: "#/components/schemas/RuntimeAction" }
        removeVolumes: { type: boolean, default: false }
        services:
          type: array
          minItems: 1
          maxItems: 16
          uniqueItems: true
          items: { type: string, minLength: 1, maxLength: 128 }
    RuntimeCommand:
      type: object
      additionalProperties: false
      required: [executable, arguments, workingDirectory]
      properties:
        executable: { type: string }
        arguments:
          type: array
          items: { type: string }
        workingDirectory: { type: string }
    RuntimePlan:
      type: object
      additionalProperties: false
      required: [projectId, driver, action, risk, summary, commands, effects, services, removeVolumes]
      properties:
        projectId: { type: string }
        driver: { type: string, enum: [compose, process] }
        action: { $ref: "#/components/schemas/RuntimeAction" }
        risk: { type: string, enum: [safe, caution, destructive] }
        summary: { type: string }
        commands:
          type: array
          items: { $ref: "#/components/schemas/RuntimeCommand" }
        effects:
          type: array
          items: { type: string }
        services:
          type: array
          items: { type: string }
        removeVolumes: { type: boolean }
    PublishedPort:
      type: object
      additionalProperties: false
      required: [containerPort, protocol]
      properties:
        hostIp: { type: string }
        hostPort: { type: integer, minimum: 0, maximum: 65535 }
        containerPort: { type: integer, minimum: 1, maximum: 65535 }
        protocol: { type: string, enum: [tcp, udp, sctp] }
    ContainerMetadata:
      type: object
      additionalProperties: false
      required: [id, name, image, restartCount]
      properties:
        id: { type: string }
        name: { type: string }
        image: { type: string }
        createdAt: { type: string, format: date-time }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
        exitCode: { type: integer }
        restartCount: { type: integer, minimum: 0 }
    ProcessMetadata:
      type: object
      additionalProperties: false
      required: [pid, executable, restartCount]
      properties:
        runId: { type: string }
        pid: { type: integer, format: int32, minimum: 1 }
        processGroup: { type: integer, format: int32, minimum: 1 }
        executable: { type: string }
        workingDirectory: { type: string }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
        exitCode: { type: integer }
        restartCount: { type: integer, minimum: 0 }
        fingerprint: { type: string }
    RuntimeServiceObservation:
      type: object
      additionalProperties: false
      required: [id, runtimeName, state, health, ports, observedAt]
      properties:
        id: { type: string }
        runtimeName: { type: string }
        state: { type: string }
        health: { type: string }
        container: { $ref: "#/components/schemas/ContainerMetadata" }
        process: { $ref: "#/components/schemas/ProcessMetadata" }
        ports:
          type: array
          items: { $ref: "#/components/schemas/PublishedPort" }
        observedAt: { type: string, format: date-time }
    RuntimeEngineObservation:
      type: object
      additionalProperties: false
      required: [connected]
      properties:
        connected: { type: boolean }
        context: { type: string }
        serverVersion: { type: string }
        apiVersion: { type: string }
        errorCode: { type: string }
        errorMessage: { type: string }
    RuntimeObservation:
      type: object
      additionalProperties: false
      required: [projectId, driver, projectIdentity, state, origin, services, observedAt]
      properties:
        projectId: { type: string }
        driver: { type: string, enum: [compose, process] }
        projectIdentity: { type: string }
        state:
          type: string
          enum: [unknown, stopped, starting, running, running_external, partially_running, degraded, paused, stopping, failed]
        origin: { type: string, enum: [switchyard, external] }
        engine: { $ref: "#/components/schemas/RuntimeEngineObservation" }
        services:
          type: array
          items: { $ref: "#/components/schemas/RuntimeServiceObservation" }
        observedAt: { type: string, format: date-time }
    RuntimeLogEntry:
      type: object
      additionalProperties: false
      required: [sequence, timestamp, projectId, serviceId, runId, source, stream, level, message, redacted, attributes]
      properties:
        sequence: { type: integer, format: int64, minimum: 1 }
        timestamp: { type: string, format: date-time }
        projectId: { type: string }
        serviceId: { type: string }
        runId: { type: string }
        source: { type: string, enum: [docker, process] }
        stream: { type: string, enum: [stdout, stderr] }
        level: { type: string }
        message: { type: string }
        operationId: { type: string }
        redacted: { type: boolean }
        attributes:
          type: object
          additionalProperties: { type: string }
    HealthResult:
      type: object
      additionalProperties: false
      required: [projectId, serviceId, checkId, type, status, severity, required, latencyMs, message, observedAt]
      properties:
        projectId: { type: string }
        serviceId: { type: string }
        checkId: { type: string }
        type: { type: string, enum: [http, tcp, process, docker, command, composite] }
        status: { type: string, enum: [healthy, unhealthy, unknown] }
        severity: { type: string, enum: [info, warning, critical] }
        required: { type: boolean }
        latencyMs: { type: integer, format: int64, minimum: 0 }
        message: { type: string }
        observedAt: { type: string, format: date-time }
    ProjectHealth:
      type: object
      additionalProperties: false
      required: [projectId, status, observerState, results, observedAt]
      properties:
        projectId: { type: string }
        status: { type: string, enum: [healthy, unhealthy, unknown] }
        observerState: { type: string, enum: [connected, stale, disconnected] }
        results:
          type: array
          items: { $ref: "#/components/schemas/HealthResult" }
        observedAt: { type: string, format: date-time }
    RuntimeMetricSample:
      type: object
      additionalProperties: false
      required: [timestamp, projectId, serviceId, cpuPercent, cpuAvailable, memoryBytes, memoryLimit, memoryAvailable, networkRxBytes, networkTxBytes, networkAvailable, diskReadBytes, diskWriteBytes, diskAvailable, processCount, restartCount, partial]
      properties:
        timestamp: { type: string, format: date-time }
        projectId: { type: string }
