openapi: 3.0.3
info:
  title: Switchyard Local API
  version: 1.0.0
  description: Local control-plane contract shared by browser, desktop, and CLI clients.
servers:
  - url: /api/v1
paths:
  /system:
    get:
      operationId: getSystem
      summary: Read daemon and storage status
      responses:
        "200":
          description: Current daemon status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemInfo"
        default:
          $ref: "#/components/responses/Problem"
  /auth/bootstrap-tokens:
    post:
      operationId: createBrowserBootstrapToken
      summary: Create a one-time browser bootstrap token over privileged local IPC
      responses:
        "201":
          description: One-time bootstrap token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserBootstrap"
        default:
          $ref: "#/components/responses/Problem"
  /auth/sessions:
    post:
      operationId: createBrowserSession
      summary: Exchange a one-time bootstrap token for a same-origin session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrowserSessionRequest"
      responses:
        "201":
          description: Browser session created
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserSession"
        default:
          $ref: "#/components/responses/Problem"
  /operations/{operationId}:
    parameters:
      - $ref: "#/components/parameters/OperationId"
    get:
      operationId: getOperation
      summary: Read a durable operation
      responses:
        "200":
          description: Durable operation state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        default:
          $ref: "#/components/responses/Problem"
  /operations:
    get:
      operationId: listOperations
      summary: List recent durable operations
      parameters:
        - name: projectId
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, format: int64, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Recent durable operations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Operation" }
        default:
          $ref: "#/components/responses/Problem"
  /operations/{operationId}/cancel:
    parameters:
      - $ref: "#/components/parameters/OperationId"
    post:
      operationId: cancelOperation
      summary: Request idempotent operation cancellation
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Current operation after the cancellation request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        default:
          $ref: "#/components/responses/Problem"
  /manifest-proposals:
    post:
      operationId: createManifestProposal
      summary: Scan a selected repository into an untrusted manifest proposal
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateManifestProposalRequest"
      responses:
        "201":
          description: Reviewable deterministic proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestProposal"
        default:
          $ref: "#/components/responses/Problem"
  /manifest-proposals/{proposalId}:
    parameters:
      - $ref: "#/components/parameters/ProposalId"
    get:
      operationId: getManifestProposal
      summary: Read candidate manifest and source evidence
      responses:
        "200":
          description: Reviewable proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestProposal"
        default:
          $ref: "#/components/responses/Problem"
  /manifest-proposals/{proposalId}/validate:
    parameters:
      - $ref: "#/components/parameters/ProposalId"
    post:
      operationId: validateManifestProposal
      summary: Revalidate an untrusted proposal against the selected root
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Proposal with current validation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestProposal"
        default:
          $ref: "#/components/responses/Problem"
  /manifest-proposals/{proposalId}/accept:
    parameters:
      - $ref: "#/components/parameters/ProposalId"
    post:
      operationId: acceptManifestProposal
      summary: Approve the proposal and trust its project
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Trusted project and accepted proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedManifestProposal"
        default:
          $ref: "#/components/responses/Problem"
  /projects:
    get:
      operationId: listProjects
      summary: List registered projects
      responses:
        "200":
          description: Registered project catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProject
      summary: Read one registered project
      responses:
        "200":
          description: Registered project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        default:
          $ref: "#/components/responses/Problem"
    delete:
      operationId: removeProject
      summary: Remove catalog state without changing repository files
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204": { description: Project removed }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/trust:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: trustProject
      summary: Validate and accept the latest project proposal
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Trusted project and accepted proposal
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AcceptedManifestProposal" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/manifest/explain:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: explainProjectManifest
      summary: Resolve the effective manifest with field provenance
      responses:
        "200":
          description: Effective manifest and provenance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EffectiveManifest"
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/manifest/diff:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: diffProjectManifest
      summary: Compare the accepted and effective manifests
      responses:
        "200":
          description: Canonical manifest comparison
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestDiff"
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/manifest/validate:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: validateProjectManifest
      summary: Validate the fully resolved manifest
      responses:
        "200":
          description: Effective manifest validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestValidation"
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/runtime:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProjectRuntime
      summary: Observe current project runtime state
      responses:
        "200":
          description: Current driver observation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeObservation" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/runtime/plan:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: planProjectRuntime
      summary: Preview a project lifecycle action without executing it
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RuntimeActionRequest" }
      responses:
        "200":
          description: Side-effect-free lifecycle preview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimePlan" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/operations:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: createProjectOperation
      summary: Queue a durable project lifecycle operation
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RuntimeActionRequest" }
      responses:
        "202":
          description: Durable operation accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/logs:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProjectLogs
      summary: Read a bounded snapshot of runtime logs
      parameters:
        - name: service
          in: query
          schema: { type: string }
        - name: since
          in: query
          schema: { type: string }
        - name: tail
          in: query
          schema: { type: integer, minimum: 1, maximum: 10000, default: 200 }
      responses:
        "200":
          description: Bounded runtime log lines
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RuntimeLogEntry" }
        default:
          $ref: "#/components/responses/Problem"
  /projects/{projectId}/metrics:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProjectMetrics
      summary: Read one current resource sample per runtime service
      parameters:
        - name: service
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Current runtime resource samples
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RuntimeMetricSample" }
        default:
          $ref: "#/components/responses/Problem"
components:
  parameters:
    OperationId:
      name: operationId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    ProposalId:
      name: proposalId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
  responses:
    Problem:
      description: RFC 9457-style problem details
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
  schemas:
    CreateManifestProposalRequest:
      type: object
      additionalProperties: false
      required: [path]
      properties:
        path:
          type: string
          minLength: 1
          maxLength: 4096
    Project:
      type: object
      additionalProperties: false
      required: [id, slug, displayName, trustState, primaryLocation, tags, manifestRevision, createdAt, updatedAt]
      properties:
        id: { type: string }
        slug: { type: string }
        displayName: { type: string }
        description: { type: string }
        trustState:
          type: string
          enum: [pending, trusted, rejected]
        primaryLocation: { type: string }
        tags:
          type: array
          items: { type: string }
        manifestRevision: { type: integer, format: int64, minimum: 0 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    SourceRange:
      type: object
      additionalProperties: false
      required: [startLine, endLine]
      properties:
        startLine: { type: integer, minimum: 1 }
        endLine: { type: integer, minimum: 1 }
    DiscoveryEvidence:
      type: object
      additionalProperties: false
      required: [id, scanner, kind, sourcePath, location, confidence, data, warnings]
      properties:
        id: { type: string }
        scanner: { type: string }
        kind: { type: string }
        sourcePath: { type: string }
        location: { $ref: "#/components/schemas/SourceRange" }
        confidence: { type: number, format: double, minimum: 0, maximum: 1 }
        data:
          type: object
          additionalProperties: true
        warnings:
          type: array
          items: { type: string }
    ManifestValidation:
      type: object
      additionalProperties: false
      required: [valid, errors, warnings]
      properties:
        valid: { type: boolean }
        errors:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }
    ManifestProposal:
      type: object
      additionalProperties: false
      required: [id, projectId, scannerVersion, schemaVersion, candidate, evidence, confidenceByField, unresolved, validation, status, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        scannerVersion: { type: string }
        schemaVersion: { type: string }
        candidate:
          type: object
          description: Canonical document governed by internal/manifest/schema/project.schema.json.
          additionalProperties: true
        evidence:
          type: array
          items: { $ref: "#/components/schemas/DiscoveryEvidence" }
        confidenceByField:
          type: object
          additionalProperties: { type: number, format: double }
        unresolved:
          type: array
          items: { type: string }
        validation: { $ref: "#/components/schemas/ManifestValidation" }
        status:
          type: string
          enum: [proposed, accepted, rejected, superseded]
        createdAt: { type: string, format: date-time }
    AcceptedManifestProposal:
      type: object
      additionalProperties: false
      required: [project, proposal]
      properties:
        project: { $ref: "#/components/schemas/Project" }
        proposal: { $ref: "#/components/schemas/ManifestProposal" }
    ManifestSource:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: { type: string }
        path: { type: string }
    EffectiveManifest:
      type: object
      additionalProperties: false
      required: [manifest, provenance, sources]
      properties:
        manifest: { type: object, additionalProperties: true }
        provenance:
          type: object
          additionalProperties: { type: string }
        sources:
          type: array
          items: { $ref: "#/components/schemas/ManifestSource" }
    ManifestDiff:
      type: object
      additionalProperties: false
      required: [accepted, effective]
      properties:
        accepted: { type: object, additionalProperties: true }
        effective: { type: object, additionalProperties: true }
    BrowserBootstrap:
      type: object
      additionalProperties: false
      required: [token, expiresAt]
      properties:
        token:
          type: string
        expiresAt:
          type: string
          format: date-time
    CreateBrowserSessionRequest:
      type: object
      additionalProperties: false
      required: [bootstrapToken]
      properties:
        bootstrapToken:
          type: string
          minLength: 1
    BrowserSession:
      type: object
      additionalProperties: false
      required: [csrfToken, expiresAt]
      properties:
        csrfToken:
          type: string
        expiresAt:
          type: string
          format: date-time
    RuntimeAction:
      type: string
      enum: [start, stop, restart, pause, unpause, rebuild, teardown]
    RuntimeActionRequest:
      type: object
      additionalProperties: false
      required: [action]
      properties:
        action: { $ref: "#/components/schemas/RuntimeAction" }
        removeVolumes: { type: boolean, default: false }
    RuntimeCommand:
      type: object
      additionalProperties: false
      required: [executable, arguments, workingDirectory]
      properties:
        executable: { type: string }
        arguments:
          type: array
          items: { type: string }
        workingDirectory: { type: string }
    RuntimePlan:
      type: object
      additionalProperties: false
      required: [projectId, driver, action, risk, summary, commands, effects, removeVolumes]
      properties:
        projectId: { type: string }
        driver: { type: string, enum: [compose, process] }
        action: { $ref: "#/components/schemas/RuntimeAction" }
        risk: { type: string, enum: [safe, caution, destructive] }
        summary: { type: string }
        commands:
          type: array
          items: { $ref: "#/components/schemas/RuntimeCommand" }
        effects:
          type: array
          items: { type: string }
        removeVolumes: { type: boolean }
    PublishedPort:
      type: object
      additionalProperties: false
      required: [containerPort, protocol]
      properties:
        hostIp: { type: string }
        hostPort: { type: integer, minimum: 0, maximum: 65535 }
        containerPort: { type: integer, minimum: 1, maximum: 65535 }
        protocol: { type: string, enum: [tcp, udp, sctp] }
    ContainerMetadata:
      type: object
      additionalProperties: false
      required: [id, name, image, restartCount]
      properties:
        id: { type: string }
        name: { type: string }
        image: { type: string }
        createdAt: { type: string, format: date-time }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
        exitCode: { type: integer }
        restartCount: { type: integer, minimum: 0 }
    ProcessMetadata:
      type: object
      additionalProperties: false
      required: [pid, executable, restartCount]
      properties:
        runId: { type: string }
        pid: { type: integer, format: int32, minimum: 1 }
        processGroup: { type: integer, format: int32, minimum: 1 }
        executable: { type: string }
        workingDirectory: { type: string }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
        exitCode: { type: integer }
        restartCount: { type: integer, minimum: 0 }
        fingerprint: { type: string }
    RuntimeServiceObservation:
      type: object
      additionalProperties: false
      required: [id, runtimeName, state, health, ports, observedAt]
      properties:
        id: { type: string }
        runtimeName: { type: string }
        state: { type: string }
        health: { type: string }
        container: { $ref: "#/components/schemas/ContainerMetadata" }
        process: { $ref: "#/components/schemas/ProcessMetadata" }
        ports:
          type: array
          items: { $ref: "#/components/schemas/PublishedPort" }
        observedAt: { type: string, format: date-time }
    RuntimeEngineObservation:
      type: object
      additionalProperties: false
      required: [connected]
      properties:
        connected: { type: boolean }
        context: { type: string }
        serverVersion: { type: string }
        apiVersion: { type: string }
        errorCode: { type: string }
        errorMessage: { type: string }
    RuntimeObservation:
      type: object
      additionalProperties: false
      required: [projectId, driver, projectIdentity, state, origin, services, observedAt]
      properties:
        projectId: { type: string }
        driver: { type: string, enum: [compose, process] }
        projectIdentity: { type: string }
        state:
          type: string
          enum: [unknown, stopped, starting, running, running_external, partially_running, degraded, paused, stopping, failed]
        origin: { type: string, enum: [switchyard, external] }
        engine: { $ref: "#/components/schemas/RuntimeEngineObservation" }
        services:
          type: array
          items: { $ref: "#/components/schemas/RuntimeServiceObservation" }
        observedAt: { type: string, format: date-time }
    RuntimeLogEntry:
      type: object
      additionalProperties: false
      required: [timestamp, projectId, serviceId, runId, source, stream, level, message, attributes]
      properties:
        timestamp: { type: string, format: date-time }
        projectId: { type: string }
        serviceId: { type: string }
        runId: { type: string }
        source: { type: string, enum: [docker, process] }
        stream: { type: string, enum: [stdout, stderr] }
        level: { type: string }
        message: { type: string }
        attributes:
          type: object
          additionalProperties: { type: string }
    RuntimeMetricSample:
      type: object
      additionalProperties: false
      required: [timestamp, projectId, serviceId, cpuPercent, memoryBytes, memoryLimit, networkRxBytes, networkTxBytes]
      properties:
        timestamp: { type: string, format: date-time }
        projectId: { type: string }
        serviceId: { type: string }
        cpuPercent: { type: number, format: double, minimum: 0 }
        memoryBytes: { type: integer, format: int64, minimum: 0 }
        memoryLimit: { type: integer, format: int64, minimum: 0 }
        networkRxBytes: { type: integer, format: int64, minimum: 0 }
        networkTxBytes: { type: integer, format: int64, minimum: 0 }
    Operation:
      type: object
      additionalProperties: false
      required:
        - id
        - projectId
        - kind
        - state
        - requestedAt
        - updatedAt
        - cancellationRequested
      properties:
        id:
          type: string
        projectId:
          type: string
        kind:
          type: string
        state:
          $ref: "#/components/schemas/OperationState"
        errorCode:
          type: string
        errorMessage:
          type: string
        cancellationRequested:
          type: boolean
        requestedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    OperationState:
      type: string
      enum: [queued, running, succeeded, failed, cancelled, partially_succeeded]
    SystemInfo:
      type: object
      additionalProperties: false
      required:
        - status
        - version
        - commit
        - apiVersion
        - databaseSchemaVersion
        - startedAt
      properties:
        status:
          type: string
          enum: [ready]
        version:
          type: string
        commit:
          type: string
        builtAt:
          type: string
          format: date-time
          nullable: true
        apiVersion:
          type: string
        databaseSchemaVersion:
          type: integer
          format: int64
          minimum: 0
        startedAt:
          type: string
          format: date-time
    ProblemDetails:
      type: object
      additionalProperties: false
      required: [type, title, status, code, correlationId]
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        code:
          type: string
        correlationId:
          type: string
