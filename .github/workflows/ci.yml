name: CI

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION_FILE: .go-version
  NODE_VERSION_FILE: .node-version

jobs:
  go:
    name: Go quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum
      - run: go mod download
      - run: make generate-go
      - run: git diff --exit-code -- internal/manifest/schema/project.schema.json internal/platform/sqlite/generated internal/transport/contract/generated
      - run: make repository-check
      - run: make fmt-check
      - run: go vet ./...
      - run: make archcheck
      - run: go test ./...
      - run: go test -race ./...
      - run: make migrate-check
      - run: make vuln

  go-lint:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  platforms:
    name: ${{ matrix.name }} adapters
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
          - name: Linux
            os: ubuntu-latest
          - name: Windows
            os: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum
      - run: go test ./internal/platform/localipc ./internal/runtime/process ./internal/terminal/adapters ./internal/actions/adapters ./internal/ports/adapters
      - run: go build ./cmd/switchyard

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir web generate
      - run: git diff --exit-code -- web/src/api/generated
      - run: pnpm --dir web lint
      - run: pnpm --dir web typecheck
      - run: pnpm --dir web test
      - run: pnpm --dir web build

  browser:
    name: Browser and visual
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir web exec playwright install --with-deps chromium
      - run: pnpm --dir web test:e2e
      - run: pnpm --dir web test:visual
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 7

  desktop:
    name: macOS desktop
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: rustup show
      - run: make desktop-quality
      - run: make desktop-build
      - run: codesign --force --deep --sign - desktop/src-tauri/target/debug/bundle/macos/Switchyard.app
      - run: codesign --verify --deep --strict desktop/src-tauri/target/debug/bundle/macos/Switchyard.app
      - uses: actions/upload-artifact@v6
        with:
          name: switchyard-desktop-debug
          path: |
            desktop/src-tauri/target/debug/bundle/macos/Switchyard.app
            desktop/src-tauri/target/debug/bundle/dmg/*.dmg
          retention-days: 7

  sidecar-cross-platform:
    name: ${{ matrix.name }} desktop sidecar
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: Windows
            os: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node desktop/scripts/build-sidecar.mjs

  release-build:
    name: Embedded release build
    runs-on: ubuntu-latest
    needs: [go, go-lint, platforms, frontend, desktop, sidecar-cross-platform]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: make build
      - run: ./scripts/test-mcp-inspector.sh
      - run: ./bin/switchyard version
