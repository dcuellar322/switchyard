name: Public site deploy

on:
  pull_request:
    paths: ["site/**", "docs/**", "web/tests/visual/**"]
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-site-deploy-${{ github.event.pull_request.number || 'production' }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      SITE_PREVIEW: ${{ github.event_name == 'pull_request' && '1' || '0' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v7
        with:
          go-version-file: .go-version
          cache-dependency-path: go.sum
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm site:generate
      - run: pnpm --dir site releases
      - run: pnpm site:build
      - run: pnpm site:validate
      - uses: actions/upload-artifact@v6
        with:
          name: public-site-deploy-${{ github.sha }}
          path: site/dist
          retention-days: 7

  preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: build
    runs-on: ubuntu-latest
    environment: site-preview
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: public-site-deploy-${{ github.sha }}
          path: site/dist
      - run: pnpm --dir site exec wrangler pages deploy dist --project-name "$CLOUDFLARE_PROJECT_NAME" --branch "pr-${{ github.event.pull_request.number }}" --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ vars.CLOUDFLARE_PROJECT_NAME }}

  production:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: public-site-deploy-${{ github.sha }}
          path: site/dist
      - run: pnpm --dir site exec wrangler pages deploy dist --project-name "$CLOUDFLARE_PROJECT_NAME" --branch master --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ vars.CLOUDFLARE_PROJECT_NAME }}
      - run: pnpm --dir site smoke
