name: Release v1 artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing reviewed release tag to build
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  metadata:
    name: Validate release identity
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.channel.outputs.tag }}
      channel: ${{ steps.channel.outputs.channel }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      - id: channel
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"
          test "$(git rev-parse HEAD)" = "$(git rev-list -n 1 "$RELEASE_TAG")"
          sh ./scripts/release-channel.sh "$RELEASE_TAG"

  cli:
    name: CLI archives, checksums, and SBOMs
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.metadata.outputs.tag }}
      - uses: actions/setup-go@v7
        with:
          go-version-file: .go-version
          cache-dependency-path: go.sum
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir web build
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish
      - uses: actions/upload-artifact@v7
        with:
          name: switchyard-cli
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.cyclonedx.json
            dist/*.json
            dist/checksums.txt
            dist/switchyard-*.tar.gz
          if-no-files-found: error

  desktop:
    name: ${{ matrix.name }} desktop bundles
    needs: metadata
    runs-on: ${{ matrix.os }}
    environment: desktop-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            artifact: macos-arm64
            os: macos-15
            bundles: app,dmg
          - name: macOS Intel
            artifact: macos-amd64
            os: macos-15-intel
            bundles: app,dmg
          - name: Linux
            artifact: linux-amd64
            os: ubuntu-latest
            bundles: appimage,deb,rpm
          - name: Windows
            artifact: windows-amd64
            os: windows-latest
            bundles: msi,nsis
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.metadata.outputs.tag }}
      - uses: actions/setup-go@v7
        with:
          go-version-file: .go-version
          cache-dependency-path: go.sum
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - run: rustup show
      - id: windows-signing
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $path = Join-Path $env:RUNNER_TEMP switchyard-signing.pfx
          [IO.File]::WriteAllBytes($path, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $path -CertStoreLocation Cert:\CurrentUser\My -Password $password
          "thumbprint=$($certificate.Thumbprint)" >> $env:GITHUB_OUTPUT
      - uses: crazy-max/ghaction-import-gpg@v6
        if: runner.os == 'Linux'
        with:
          gpg_private_key: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.LINUX_GPG_PASSPHRASE }}
      - run: pnpm -C ../.. exec tauri build --config tauri.release.conf.json --bundles ${{ matrix.bundles }} --ci
        working-directory: desktop/src-tauri
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SWITCHYARD_UPDATER_PUBLIC_KEY: ${{ secrets.SWITCHYARD_UPDATER_PUBLIC_KEY }}
          SWITCHYARD_UPDATER_ENDPOINT: ${{ secrets.SWITCHYARD_UPDATER_ENDPOINT }}
          TAURI_CONFIG: ${{ runner.os == 'Windows' && format('{"bundle":{"windows":{"certificateThumbprint":"{0}","digestAlgorithm":"sha256","timestampUrl":"http://timestamp.digicert.com"}}}', steps.windows-signing.outputs.thumbprint) || '' }}
          SIGN: ${{ runner.os == 'Linux' && '1' || '' }}
          SIGN_KEY: ${{ runner.os == 'Linux' && secrets.LINUX_GPG_KEY_ID || '' }}
          APPIMAGETOOL_SIGN_PASSPHRASE: ${{ runner.os == 'Linux' && secrets.LINUX_GPG_PASSPHRASE || '' }}
          APPIMAGETOOL_FORCE_SIGN: ${{ runner.os == 'Linux' && '1' || '' }}
      - uses: anchore/sbom-action@v0
        with:
          path: desktop/src-tauri/target/release/bundle
          format: cyclonedx-json
          output-file: desktop-${{ matrix.artifact }}.cyclonedx.json
          artifact-name: desktop-${{ matrix.artifact }}-sbom
      - uses: actions/upload-artifact@v7
        with:
          name: switchyard-desktop-${{ matrix.artifact }}
          path: |
            desktop/src-tauri/target/release/bundle/**/*
            desktop-${{ matrix.artifact }}.cyclonedx.json
          if-no-files-found: error

  publish:
    name: Attest and draft release
    needs: [metadata, cli, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.metadata.outputs.tag }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          pattern: switchyard-*
          path: release
          merge-multiple: true
      - run: pnpm --dir site releases:prepare-files release "${{ needs.metadata.outputs.channel }}"
      - uses: sigstore/cosign-installer@v4
      - run: cosign sign-blob --yes --bundle release/checksums.txt.sigstore.json release/checksums.txt
      - uses: actions/attest@v4
        with:
          subject-path: release/**/*
      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: ${{ needs.metadata.outputs.channel != 'stable' }}
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: Switchyard ${{ needs.metadata.outputs.tag }} (${{ needs.metadata.outputs.channel }})
          generate_release_notes: true
          files: release/**/*
