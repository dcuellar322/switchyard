name: Bug report
description: Report reproducible behavior that differs from Switchyard's contracts
title: "bug: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Switchyard. Remove secrets and private source from all output.
  - type: textarea
    id: outcome
    attributes:
      label: What happened?
      description: Describe the actual and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest safe sequence that reproduces the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Switchyard version or commit
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [macOS, Linux, Windows, WSL, Other]
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics
      description: Paste a previewed/redacted doctor result or relevant logs. Never include credentials or private source.
      render: text
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: I removed secrets, tokens, private source, and personal data.
          required: true
        - label: I searched for an existing issue.
          required: true
