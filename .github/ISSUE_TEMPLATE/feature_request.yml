name: Feature request
description: Propose a focused product or architecture improvement
title: "feat: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or operational gap should Switchyard solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe behavior, not just an implementation mechanism.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Boundaries and safety
      description: Which domains, trust boundaries, risks, and roadmap phase are involved?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope checks
      options:
        - label: This remains project-first and local-first.
          required: true
        - label: This does not require AI for core operation.
          required: true
